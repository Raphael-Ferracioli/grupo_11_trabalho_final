openapi: 3.0.3
info:
  title: GoodFilms API
  version: 1.0.0
  description: API REST versionada para catálogo, avaliações e favoritos de filmes.
servers:
  - url: /api/v1
paths:
  /filmes/:
    get:
      summary: Lista filmes cadastrados
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
        - name: genero
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de filmes
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Filme'
                  page:
                    type: integer
                    example: 1
                  total_pages:
                    type: integer
                    example: 5
                  total_items:
                    type: integer
                    example: 47
  /filmes/{id}/:
    get:
      summary: Detalha um filme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Filme encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filme'
        '404':
          description: Filme não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /filmes/{id}/avaliacoes/:
    post:
      summary: Cria ou atualiza avaliação do usuário autenticado
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nota
              properties:
                nota:
                  type: number
                  minimum: 0
                  maximum: 5
                  example: 4.5
                comentario:
                  type: string
                  example: Filme excelente, roteiro impecável.
      responses:
        '201':
          description: Avaliação registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 12
                  message:
                    type: string
                    example: Avaliação registrada.
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Usuário não autenticado
  /filmes/{id}/favoritos/:
    post:
      summary: Marca filme como favorito
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Favorito criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Filme favoritado.
        '401':
          description: Usuário não autenticado
        '404':
          description: Filme não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
    delete:
      summary: Remove filme dos favoritos
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Favorito removido
        '401':
          description: Usuário não autenticado
        '404':
          description: Filme não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
components:
  schemas:
    Filme:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Matrix
        titulo_original:
          type: string
          example: The Matrix
        ano_lancamento:
          type: integer
          example: 1999
        diretor:
          type: string
          example: Lana Wachowski
        genero:
          type: string
          example: Ficção científica
        duracao_minutos:
          type: integer
          example: 136
        sinopse:
          type: string
          example: Um hacker descobre que a realidade é uma simulação.
        poster:
          type: string
          format: uri
          example: https://example.com/matrix.jpg
        total_visualizacoes:
          type: integer
          example: 320
    Erro:
      type: object
      properties:
        error:
          type: string
          example: O campo "nota" é obrigatório.
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
